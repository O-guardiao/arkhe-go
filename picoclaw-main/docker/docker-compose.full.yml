# ============================================================
# arkhe-go — docker-compose full (Node.js + Python + MCP support)
#
# Build context is always the arkhe-go root so the local rlm-go
# dependency is included in every image.
#
# Usage (run from picoclaw-main/):
#   docker compose -f docker/docker-compose.full.yml --profile agent   run --rm arkhe-agent -m "Hello"
#   docker compose -f docker/docker-compose.full.yml --profile gateway up -d
# ============================================================

x-arkhe-full-build: &arkhe_full_build
  context: ../..
  dockerfile: picoclaw-main/docker/Dockerfile.full

services:
  # ─────────────────────────────────────────────
  # Agent (one-shot interactive query) — Full MCP support
  # ─────────────────────────────────────────────
  arkhe-agent:
    build: *arkhe_full_build
    image: arkhe-go:full-local
    container_name: arkhe-agent-full
    pull_policy: never
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.picoclaw/config.json:ro
      - arkhe-workspace:/root/.picoclaw/workspace
      - arkhe-npm-cache:/root/.npm
    entrypoint: ["picoclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Gateway (long-running bot) — Full MCP support
  # ─────────────────────────────────────────────
  arkhe-gateway:
    build: *arkhe_full_build
    image: arkhe-go:full-local
    container_name: arkhe-gateway-full
    restart: unless-stopped
    pull_policy: never
    profiles:
      - gateway
    ports:
      - "18790:18790"
    environment:
      - PICOCLAW_GATEWAY_HOST=0.0.0.0
    volumes:
      - ../config/config.json:/root/.picoclaw/config.json:ro
      - arkhe-workspace:/root/.picoclaw/workspace
      - arkhe-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  arkhe-workspace:
  arkhe-npm-cache:
