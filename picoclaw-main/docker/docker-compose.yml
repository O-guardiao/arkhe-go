# ============================================================
# arkhe-go — docker-compose (minimal Alpine images)
#
# Build context is always the arkhe-go root so the local rlm-go
# dependency is included in every image.
#
# Usage (run from picoclaw-main/):
#   docker compose -f docker/docker-compose.yml --profile agent   run --rm arkhe-agent -m "Hello"
#   docker compose -f docker/docker-compose.yml --profile gateway up -d
#   docker compose -f docker/docker-compose.yml --profile launcher up -d
# ============================================================

x-arkhe-build: &arkhe_build
  context: ../..
  dockerfile: picoclaw-main/docker/Dockerfile

x-arkhe-launcher-build: &arkhe_launcher_build
  context: ../..
  dockerfile: picoclaw-main/docker/Dockerfile.launcher

services:
  # ─────────────────────────────────────────────
  # Agent (one-shot interactive query)
  # ─────────────────────────────────────────────
  arkhe-agent:
    build: *arkhe_build
    image: arkhe-go:local
    container_name: arkhe-agent
    pull_policy: never
    profiles:
      - agent
    volumes:
      - ./data:/root/.picoclaw
    entrypoint: ["picoclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Gateway (long-running bot)
  # ─────────────────────────────────────────────
  arkhe-gateway:
    build: *arkhe_build
    image: arkhe-go:local
    container_name: arkhe-gateway
    restart: unless-stopped
    pull_policy: never
    profiles:
      - gateway
    ports:
      - "18790:18790"
    environment:
      - PICOCLAW_GATEWAY_HOST=0.0.0.0
    volumes:
      - ./data:/root/.picoclaw

  # ─────────────────────────────────────────────
  # Launcher (Web Console + Gateway)
  # ─────────────────────────────────────────────
  arkhe-launcher:
    build: *arkhe_launcher_build
    image: arkhe-go:launcher-local
    container_name: arkhe-launcher
    restart: unless-stopped
    pull_policy: never
    profiles:
      - launcher
    ports:
      - "18800:18800"
      - "18790:18790"
    environment:
      - PICOCLAW_GATEWAY_HOST=0.0.0.0
      # Set a fixed token instead of a random one each restart:
      # - PICOCLAW_LAUNCHER_TOKEN=your-secret-token-here
    volumes:
      - ./data:/root/.picoclaw
